title = "Betterleaks custom configuration"

[extend]
useDefault = true

[allowlist]
description = "Ignore test directories and files with intentional sample data"
paths = [
  '''__tests__''',
  '''src/utils/__tests__/dataObfuscator\.test\.ts''',
  '''README\.md''',
  '''api/src/routes/analysers\.ts''',
  '''api/openapi\.json''',
  '''src/components/utils/JWTDebugger\.tsx''',
]

services:
  qautils-cli-rest-api:
    image: ghcr.io/kobenguyent/qautils-cli-rest-api:latest
    # Or build locally:
    # build:
    #   context: ./api
    #   dockerfile: Dockerfile
    container_name: qautils-cli-rest-api
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:3333"
    environment:
      - NODE_ENV=production
      - PORT=3333
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

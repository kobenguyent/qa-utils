name: Publish qautils-cli to npm

on:
  push:
    branches: [main]
    paths:
      - 'cli/package.json'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    # For push events: publish only when the package version is not yet on npm.
    # For release events: publish only when tagged cli-v*.
    # For manual dispatch: always publish.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'cli-v')) ||
      github.event_name == 'push'
    permissions:
      id-token: write  # Required for OIDC provenance
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Read local CLI version
        id: local_version
        working-directory: cli
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Read published npm version
        id: npm_version
        run: |
          PUBLISHED=$(npm view qautils-cli version 2>/dev/null || echo "0.0.0")
          echo "version=$PUBLISHED" >> "$GITHUB_OUTPUT"

      - name: Skip if version already published
        if: |
          github.event_name == 'push' &&
          steps.local_version.outputs.version == steps.npm_version.outputs.version
        run: |
          echo "Version ${{ steps.local_version.outputs.version }} is already published on npm. Skipping."
          exit 0

      - name: Install dependencies
        if: |
          github.event_name != 'push' ||
          steps.local_version.outputs.version != steps.npm_version.outputs.version
        working-directory: cli
        run: npm install -g npm@latest && npm i

      - name: Build
        if: |
          github.event_name != 'push' ||
          steps.local_version.outputs.version != steps.npm_version.outputs.version
        working-directory: cli
        run: npm run build

      - name: Publish to npm
        if: |
          github.event_name != 'push' ||
          steps.local_version.outputs.version != steps.npm_version.outputs.version
        working-directory: cli
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

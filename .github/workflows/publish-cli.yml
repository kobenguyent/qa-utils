name: Publish qautils-cli to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run on releases tagged as cli-v* or when triggered manually
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kobenguyent'

      - name: Install dependencies
        working-directory: cli
        run: npm install

      - name: Run linter
        working-directory: cli
        run: npm run lint

      - name: Run tests
        working-directory: cli
        run: npm test

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

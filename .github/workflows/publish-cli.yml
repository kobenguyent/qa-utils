name: Publish qautils-cli to npm

on:
  push:
    branches: [main]
    paths:
      - 'cli/package.json'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    # For push events: publish only when the package version is not yet on npm.
    # For release events: publish only when tagged cli-v*.
    # For manual dispatch: always publish.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'cli-v')) ||
      github.event_name == 'push'
    permissions:
      id-token: write  # Required for OIDC provenance
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Check whether publish is needed
        id: version_check
        working-directory: cli
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view qautils-cli version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL is already published on npm. Skipping."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish version $LOCAL (currently $PUBLISHED on npm)."
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: cli
        run: npm install -g npm@latest && npm i

      - name: Build
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: cli
        run: npm run build

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: cli
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
